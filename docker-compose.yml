services:
  db:
    image: postgres:16-alpine
    container_name: ft_checkmate_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_checkmate_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./frontend:/app
      - /app/node_modules
volumes:
  postgres_data: