<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Avatar Assembly">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#a251b6"/>
      <stop offset="100%" stop-color="#6f3480"/>
    </radialGradient>
  </defs>
  <!-- fond sombre, cohérent avec le thème du site (#262522) -->
  <rect width="200" height="200" fill="#262522"/>
  <!-- pion : disque principal -->
  <circle cx="100" cy="100" r="72" fill="url(#g)" stroke="#1e1c18" stroke-width="6"/>
  <!-- anneaux caractéristiques du pion de dames -->
  <circle cx="100" cy="100" r="58" fill="none" stroke="#6f3480" stroke-width="3" opacity="0.75"/>
  <circle cx="100" cy="100" r="46" fill="none" stroke="#6f3480" stroke-width="3" opacity="0.55"/>
  <!-- couronne (la pièce est une "dame") -->
  <path d="M70 108 L78 84 L90 98 L100 78 L110 98 L122 84 L130 108 Z"
        fill="#f5f3ef" stroke="#1e1c18" stroke-width="3" stroke-linejoin="round"/>
  <rect x="70" y="110" width="60" height="10" rx="3" fill="#f5f3ef" stroke="#1e1c18" stroke-width="3"/>
  <!-- reflet -->
  <ellipse cx="78" cy="70" rx="20" ry="12" fill="#ffffff" opacity="0.18"/>
</svg>